<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kansai Group — Import Duty Calculator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ── 3-colour core palette ── */
  --bg:      #F5F6F9;   /* cool off-white */
  --surface: #FFFFFF;
  --ink:     #1C2030;   /* near-black navy — primary text/headers */
  --ink-mid: #5C6478;
  --ink-soft:#9AA2B4;
  --border:  #E7E9F0;
  --red:     #E0303D;   /* Kansai red — accent / actions */
  --red-light: #FDECEE;
  --red-dark:  #C2202D;
  --gold:      #C9A227;  /* third accent — highlights / selections */
  --gold-light:#FBF3D9;
  --gold-dark: #97791C;
  /* result green is semantic, not part of the core 3 */
  --green:      #16A34A;
  --green-bg:   #E9FBF1;
  --green-text: #0F7A38;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3, .display { font-family: 'Space Grotesk', sans-serif; }

/* ── HEADER ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo-mark {
  width: 40px; height: 40px;
  display: grid;
  place-items: center;
  flex-shrink: 0;
}
.kg-hex { fill: var(--red); }
.kg-text { fill: #fff; }
.header-title { font-weight: 700; font-size: 16px; color: var(--ink); letter-spacing: -0.01em; }
.header-sub { font-size: 12px; color: var(--ink-soft); margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 14px; }
.rate-pill {
  background: var(--ink);
  color: #fff;
  border-radius: 20px;
  padding: 5px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.rate-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); }
.header-count { font-size: 12px; color: var(--ink-soft); font-weight: 500; }

/* ── LAYOUT ── */
.layout {
  max-width: 980px;
  margin: 0 auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.card-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-header h2 { font-size: 14px; font-weight: 600; color: var(--ink); }
.card-header .count {
  font-size: 11px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--ink-mid);
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 600;
}
.card-body { padding: 18px 20px; }

/* ── SEARCH BAR ── */
.search-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.search-row-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }

label.field-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-soft);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}

input[type="text"], input[type="number"], select {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 9px 12px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: var(--ink);
  background: var(--surface);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
input::placeholder { color: var(--ink-soft); }
input:focus, select:focus {
  border-color: var(--red);
  box-shadow: 0 0 0 3px rgba(224,48,61,0.10);
}
select { cursor: pointer; }
input.mono, .mono { font-family: 'JetBrains Mono', monospace; }

/* ── AUTOCOMPLETE ── */
.ac-wrap { position: relative; }
.ac-list {
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 12px 28px rgba(28,32,48,.10);
  max-height: 240px;
  overflow-y: auto;
  z-index: 300;
  list-style: none;
  padding: 6px;
  display: none;
}
.ac-list.open { display: block; }
.ac-item { padding: 8px 10px; font-size: 13px; cursor: pointer; border-radius: 7px; }
.ac-item:hover, .ac-item.hl { background: var(--gold-light); color: var(--gold-dark); }
.ac-empty { padding: 10px 12px; font-size: 12px; color: var(--ink-soft); }

/* ── TABLE ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead { position: sticky; top: 0; background: var(--bg); }
th {
  padding: 10px 16px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  color: var(--ink-soft);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
tbody tr { cursor: pointer; transition: background 0.1s; }
tbody tr:hover { background: var(--bg); }
tbody tr.active-row { background: var(--gold-light) !important; }
tbody tr.active-row td { border-bottom-color: #F0E2B3; }
.td-brand { font-weight: 700; font-size: 13px; white-space: nowrap; color: var(--ink); }
.td-model { color: var(--ink-mid); font-size: 12px; max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.td-cc { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-mid); }
.td-cur {
  display: inline-block; background: var(--bg); border: 1px solid var(--border);
  color: var(--ink-mid); font-size: 11px; padding: 2px 7px; border-radius: 5px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}
.td-fob { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; color: var(--ink); }
.no-results { text-align: center; padding: 48px 24px; color: var(--ink-soft); font-size: 13px; line-height: 1.7; }

/* ── PAGINATION ── */
.pagination {
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--ink-soft);
  flex-wrap: wrap;
  gap: 8px;
}
.pag-btns { display: flex; gap: 4px; }
.pag-btn {
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--ink);
  padding: 5px 11px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  transition: all 0.1s;
}
.pag-btn:hover:not(:disabled) { border-color: var(--red); color: var(--red); }
.pag-btn.cur { background: var(--red); border-color: var(--red); color: #fff; }
.pag-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── CALCULATOR CARD ── */
.rate-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
.rate-row .field-label { font-size: 10px; }
.rate-link { font-size: 11px; color: var(--ink-soft); margin-top: 10px; line-height: 1.6; }
.rate-link a { color: var(--red); text-decoration: none; font-weight: 600; }
.rate-link a:hover { text-decoration: underline; }

.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* ── DUTY GAUGE ── */
.gauge-label { font-size: 11px; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.duty-gauge { display: flex; gap: 4px; }
.gauge-seg {
  flex: 1;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 8px 4px;
  text-align: center;
  transition: all 0.15s;
}
.gauge-seg .g-cc { font-size: 9px; color: var(--ink-soft); font-weight: 600; line-height: 1.3; }
.gauge-seg .g-pct { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; color: var(--ink-mid); margin-top: 2px; }
.gauge-seg.active { background: var(--ink); border-color: var(--ink); transform: translateY(-2px); }
.gauge-seg.active .g-cc { color: rgba(255,255,255,.65); }
.gauge-seg.active .g-pct { color: var(--red); }

/* ── CALC PANEL ── */
.sel-info { margin-bottom: 14px; }
.sel-brand { font-weight: 700; font-size: 16px; color: var(--ink); font-family: 'Space Grotesk', sans-serif; }
.sel-model { font-size: 12px; color: var(--ink-mid); margin-top: 3px; line-height: 1.4; }
.sel-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.tag {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--ink-mid);
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 6px;
  font-weight: 600;
}
.tag.red { background: var(--red); border-color: var(--red); color: #fff; }

.fob-display {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-left: 4px solid var(--gold);
  border-radius: 9px;
  padding: 10px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  margin-top: 6px;
}

.calc-steps { margin-top: 14px; }
.step {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.step:last-child { border-bottom: none; }
.step-left { flex: 1; }
.step-letter {
  display: inline-block;
  width: 20px; height: 20px;
  border-radius: 6px;
  background: var(--ink);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  text-align: center;
  line-height: 20px;
  margin-right: 8px;
  font-family: 'JetBrains Mono', monospace;
}
.step-name { font-weight: 600; font-size: 13px; color: var(--ink); }
.step-sub { font-size: 11px; color: var(--ink-soft); margin-top: 2px; margin-left: 28px; }
.step-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  white-space: nowrap;
  text-align: right;
}
.step-val.big { font-size: 15px; color: var(--red); }

/* ── RESULT BOX ── */
.result-box {
  background: var(--green-bg);
  border: 1.5px solid #BBF0CF;
  border-radius: 12px;
  padding: 18px;
  text-align: center;
  margin-top: 14px;
}
.result-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--green-text); margin-bottom: 5px; }
.result-value { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; color: var(--green); }
.result-sub { font-size: 12px; color: var(--green-text); margin-top: 5px; font-weight: 500; }

/* ── ACTIONS ── */
.action-row { display: flex; gap: 10px; margin-top: 14px; }
.btn {
  flex: 1;
  padding: 11px;
  border-radius: 9px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all 0.15s;
}
.btn-primary { background: var(--red); color: #fff; border-color: var(--red); }
.btn-primary:hover { background: var(--red-dark); border-color: var(--red-dark); }
.btn-ghost { background: var(--surface); color: var(--ink-mid); border-color: var(--border); }
.btn-ghost:hover { border-color: var(--ink-soft); color: var(--ink); }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 36px 16px; color: var(--ink-soft); }
.empty .icon { width: 44px; height: 44px; margin: 0 auto 12px; color: var(--ink-soft); opacity: 0.4; }
.empty p { font-size: 13px; line-height: 1.6; }

/* ── LOADING ── */
.loading-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  color: var(--ink-soft);
  font-size: 13px;
}

/* ── PRINT ── */
@media print {
  .header, .search-row, .search-row-4, .table-wrap, .pagination, .rate-row, .rate-link, .action-row, .gauge-seg:not(.active) { display: none !important; }
  .layout { grid-template-columns: 1fr; }
  body { background: white; }
}

@media (max-width: 980px) {
  .layout { padding: 14px; }
  .search-row-4 { grid-template-columns: 1fr 1fr; }
  .header { padding: 0 14px; }
}
@media (max-width: 520px) {
  .search-row, .search-row-4, .rate-row { grid-template-columns: 1fr 1fr; }
  .duty-gauge { flex-wrap: wrap; }
  .gauge-seg { flex: 1 1 30%; }
  .header-count { display: none; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo-mark">
      <svg width="40" height="40" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,4 93,27 93,73 50,96 7,73 7,27" class="kg-hex"/>
        <text x="50" y="63" text-anchor="middle" class="kg-text" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="34">KG</text>
      </svg>
    </div>
    <div>
      <div class="header-title">Kansai Group</div>
      <div class="header-sub">Import Duty Calculator</div>
    </div>
  </div>
  <div class="header-right">
    <span class="header-count" id="totalCount"></span>
    <span class="rate-pill"><span class="dot"></span>JPY <span id="jpyBadge">0.0315</span></span>
  </div>
</div>

<div id="app">
  <div class="loading-screen">Loading vehicle database…</div>
</div>

<script>
// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
const PER_PAGE = 25;
let DB = [];          // [no, brand, model, cc, currency, fob12, fob24, fob36, fob48, fob60]
let filtered = [];
let pg = 1;
let sel = null;

// Autocomplete keyboard-nav state
const acState = {
  brand: { items: [], idx: -1, onPick: null },
  model: { items: [], idx: -1, onPick: null },
};

// ═══════════════════════════════════════════════════
// LOAD DATA, THEN BUILD PAGE
// ═══════════════════════════════════════════════════
fetch('cars.json')
  .then(r => r.json())
  .then(data => {
    DB = data;
    document.getElementById('totalCount').textContent = DB.length.toLocaleString() + ' vehicles';
    buildPage();
  })
  .catch(err => {
    document.getElementById('app').innerHTML =
      '<div class="loading-screen">Could not load cars.json — make sure it is uploaded in the same folder as index.html.</div>';
    console.error(err);
  });

// ═══════════════════════════════════════════════════
// BUILD PAGE HTML (after data is ready)
// ═══════════════════════════════════════════════════
function buildPage() {
  document.getElementById('app').innerHTML = `
  <div class="layout">

    <!-- LEFT: Vehicle Table -->
    <div>
      <div class="card">
        <div class="card-header">
          <h2>Vehicle List</h2>
          <span class="count" id="countBadge">—</span>
        </div>

        <div class="card-body">
          <div class="search-row">
            <div class="ac-wrap">
              <label class="field-label">Brand</label>
              <input type="text" id="sBrand" placeholder="e.g. Toyota, Honda..." autocomplete="off">
              <ul class="ac-list" id="brandList"></ul>
            </div>
            <div class="ac-wrap">
              <label class="field-label">Model / Keywords</label>
              <input type="text" id="sModel" placeholder="e.g. Alphard, Land Cruiser..." autocomplete="off">
              <ul class="ac-list" id="modelList"></ul>
            </div>
          </div>
          <div class="search-row-4">
            <div>
              <label class="field-label">Vehicle Age</label>
              <select id="sAge">
                <option value="0">12 – 24 months</option>
                <option value="1">24 – 36 months</option>
                <option value="2">36 – 48 months</option>
                <option value="3">48 – 60 months</option>
                <option value="4">60+ months</option>
              </select>
            </div>
            <div>
              <label class="field-label">Currency</label>
              <select id="sCur">
                <option value="">All</option>
                <option value="JPY">JPY</option>
                <option value="GBP">GBP</option>
                <option value="AUD">AUD</option>
              </select>
            </div>
            <div>
              <label class="field-label">CC Range</label>
              <select id="sCC">
                <option value="">All CC</option>
                <option value="0-1499">0 – 1499</option>
                <option value="1500-1799">1500 – 1799</option>
                <option value="1800-1999">1800 – 1999</option>
                <option value="2000-2499">2000 – 2499</option>
                <option value="2500+">2500+</option>
              </select>
            </div>
            <div>
              <label class="field-label">Sort FOB</label>
              <select id="sSort">
                <option value="">Default</option>
                <option value="asc">FOB Low → High</option>
                <option value="desc">FOB High → Low</option>
              </select>
            </div>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Brand</th>
                <th>Model</th>
                <th>CC</th>
                <th>Cur</th>
                <th>FOB Value</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

        <div class="pagination">
          <span id="pgInfo" style="font-size:12px"></span>
          <div class="pag-btns">
            <button class="pag-btn" id="prevBtn" onclick="goPage(pg-1)" disabled>← Prev</button>
            <span id="pgNums" style="display:flex;gap:4px"></span>
            <button class="pag-btn" id="nextBtn" onclick="goPage(pg+1)">Next →</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Duty Calculator (full width, below the vehicle list) -->
    <div class="card">
        <div class="card-header"><h2>Duty Calculator</h2></div>
        <div class="card-body">

          <!-- Exchange rates -->
          <label class="field-label">Exchange Rates (RM per unit)</label>
          <div class="rate-row">
            <div>
              <label class="field-label">JPY</label>
              <input type="number" class="mono" id="rJPY" value="0.0315" step="0.0001" min="0">
            </div>
            <div>
              <label class="field-label">GBP</label>
              <input type="number" class="mono" id="rGBP" value="5.95" step="0.001" min="0">
            </div>
            <div>
              <label class="field-label">AUD</label>
              <input type="number" class="mono" id="rAUD" value="3.05" step="0.001" min="0">
            </div>
            <div>
              <label class="field-label">Ship (RM)</label>
              <input type="number" class="mono" id="rShip" value="1800" step="100" min="0">
            </div>
          </div>
          <div class="rate-link">Official rates updated every 2 weeks by Customs:
            <a href="http://customsgc.gov.my/cgi-bin/exchange.cgi" target="_blank">customsgc.gov.my ↗</a>
          </div>

          <div class="divider"></div>

          <!-- Duty gauge -->
          <div class="gauge-label">Duty Bracket (by engine size)</div>
          <div class="duty-gauge">
            <div class="gauge-seg" id="dr0"><div class="g-cc">0–1,499cc<br>/ EV</div><div class="g-pct">135.95%</div></div>
            <div class="gauge-seg" id="dr1"><div class="g-cc">1,500–<br>1,799cc</div><div class="g-pct">150.25%</div></div>
            <div class="gauge-seg" id="dr2"><div class="g-cc">1,800–<br>1,999cc</div><div class="g-pct">157.40%</div></div>
            <div class="gauge-seg" id="dr3"><div class="g-cc">2,000–<br>2,499cc</div><div class="g-pct">171.70%</div></div>
            <div class="gauge-seg" id="dr4"><div class="g-cc">2,500cc<br>&amp; above</div><div class="g-pct">193.15%</div></div>
          </div>

          <div class="divider"></div>

          <!-- Dynamic calc body -->
          <div id="calcBody">
            <div class="empty">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M3 12l2-5h14l2 5M5 12h14v6a1 1 0 01-1 1H6a1 1 0 01-1-1v-6z"/>
                <circle cx="7.5" cy="17" r="0.5" fill="currentColor"/>
                <circle cx="16.5" cy="17" r="0.5" fill="currentColor"/>
              </svg>
              <p>Click any vehicle in the table to calculate its import duty.</p>
            </div>
          </div>

        </div>
    </div>
  </div>
  `;

  initEvents();
  showEmptyPrompt();
}

// ═══════════════════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════════════════
function initEvents() {
  document.getElementById('sBrand').addEventListener('input', () => { onBrandInput(); doFilter(); });
  document.getElementById('sModel').addEventListener('input', () => { onModelInput(); doFilter(); });
  document.getElementById('sCur').addEventListener('change', doFilter);
  document.getElementById('sCC').addEventListener('change', doFilter);
  document.getElementById('sSort').addEventListener('change', doFilter);
  document.getElementById('sAge').addEventListener('change', () => { doFilter(); if (sel) renderCalc(); });

  document.getElementById('rJPY').addEventListener('input', () => { syncBadge(); if (sel) renderCalc(); });
  document.getElementById('rGBP').addEventListener('input', () => { if (sel) renderCalc(); });
  document.getElementById('rAUD').addEventListener('input', () => { if (sel) renderCalc(); });
  document.getElementById('rShip').addEventListener('input', () => { if (sel) renderCalc(); });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.ac-wrap')) {
      document.getElementById('brandList').classList.remove('open');
      document.getElementById('modelList').classList.remove('open');
    }
  });

  document.getElementById('sBrand').addEventListener('focus', onBrandInput);
  document.getElementById('sModel').addEventListener('focus', onModelInput);

  document.getElementById('sBrand').addEventListener('keydown', (e) => handleAcKey(e, 'brand', 'brandList'));
  document.getElementById('sModel').addEventListener('keydown', (e) => handleAcKey(e, 'model', 'modelList'));
}

// ═══════════════════════════════════════════════════
// AUTOCOMPLETE — KEYBOARD NAVIGATION
// ═══════════════════════════════════════════════════
function handleAcKey(e, key, listId) {
  const state = acState[key];
  const ul = document.getElementById(listId);
  if (!ul.classList.contains('open') || !state.items.length) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    state.idx = Math.min(state.idx + 1, state.items.length - 1);
    updateAcHl(listId, state);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    state.idx = Math.max(state.idx - 1, 0);
    updateAcHl(listId, state);
  } else if (e.key === 'Enter') {
    if (state.idx >= 0 && state.idx < state.items.length) {
      e.preventDefault();
      state.onPick(state.items[state.idx]);
    }
  } else if (e.key === 'Escape') {
    ul.classList.remove('open');
  }
}

function updateAcHl(listId, state) {
  const ul = document.getElementById(listId);
  [...ul.children].forEach((li, i) => li.classList.toggle('hl', i === state.idx));
  const active = ul.children[state.idx];
  if (active) active.scrollIntoView({ block: 'nearest' });
}

function showEmptyPrompt() {
  filtered = [];
  document.getElementById('countBadge').textContent = DB.length.toLocaleString() + ' total';
  document.getElementById('tbody').innerHTML =
    '<tr><td colspan="6" class="no-results">Start typing a Brand or Model above to search the ' + DB.length.toLocaleString() + ' vehicles in the database.</td></tr>';
  document.getElementById('pgInfo').textContent = '';
  document.getElementById('pgNums').innerHTML = '';
  document.getElementById('prevBtn').disabled = true;
  document.getElementById('nextBtn').disabled = true;
}

// ═══════════════════════════════════════════════════
// AUTOCOMPLETE
// ═══════════════════════════════════════════════════
function onBrandInput() {
  const val = document.getElementById('sBrand').value.toLowerCase().trim();
  const all = [...new Set(DB.map(c => c[1]))].sort();
  const matches = val ? all.filter(b => b.toLowerCase().includes(val)) : all;
  const onPick = (picked) => {
    document.getElementById('sBrand').value = picked;
    document.getElementById('sModel').value = '';
    document.getElementById('brandList').classList.remove('open');
    doFilter();
  };
  renderAcList('brandList', matches, onPick, 'brand');
}

function onModelInput() {
  const brandVal = document.getElementById('sBrand').value.toLowerCase().trim();
  const val = document.getElementById('sModel').value.toLowerCase().trim();
  let pool = DB;
  if (brandVal) pool = pool.filter(c => c[1].toLowerCase() === brandVal);
  const all = [...new Set(pool.map(c => c[2]))].sort();
  const matches = val ? all.filter(m => m.toLowerCase().includes(val)) : all;
  const onPick = (picked) => {
    document.getElementById('sModel').value = picked;
    document.getElementById('modelList').classList.remove('open');
    doFilter();
  };
  renderAcList('modelList', matches, onPick, 'model');
}

function renderAcList(listId, items, onPick, key) {
  const ul = document.getElementById(listId);
  acState[key].items = items;
  acState[key].idx = -1;
  acState[key].onPick = onPick;
  if (!items.length) {
    ul.innerHTML = '<li class="ac-empty">No matches</li>';
  } else {
    ul.innerHTML = items.slice(0, 100).map(item =>
      `<li class="ac-item">${escapeHtml(item)}</li>`
    ).join('');
    [...ul.children].forEach((li, i) => {
      li.addEventListener('mousedown', (e) => {
        e.preventDefault();
        onPick(items[i]);
      });
    });
  }
  ul.classList.add('open');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function getRate(cur) {
  const m = { JPY: 'rJPY', GBP: 'rGBP', AUD: 'rAUD' };
  const el = document.getElementById(m[cur] || 'rJPY');
  return el ? (parseFloat(el.value) || 0) : 0;
}

function getDuty(cc) {
  if (cc === 0)    return { pct: 1.3595, lbl: '135.95%', row: 'dr0' }; // EV
  if (cc <= 1499)  return { pct: 1.3595, lbl: '135.95%', row: 'dr0' };
  if (cc <= 1799)  return { pct: 1.5025, lbl: '150.25%', row: 'dr1' };
  if (cc <= 1999)  return { pct: 1.5740, lbl: '157.40%', row: 'dr2' };
  if (cc <= 2499)  return { pct: 1.7170, lbl: '171.70%', row: 'dr3' };
  return           { pct: 1.9315, lbl: '193.15%', row: 'dr4' };
}

function getFOB(car) {
  const idx = parseInt(document.getElementById('sAge').value);
  return car[5 + idx];
}

function getCCBucket(cc) {
  if (cc === 0 || cc <= 1499) return '0-1499';
  if (cc <= 1799) return '1500-1799';
  if (cc <= 1999) return '1800-1999';
  if (cc <= 2499) return '2000-2499';
  return '2500+';
}

function rm(n) {
  return 'RM ' + n.toLocaleString('en-MY', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function syncBadge() {
  const v = parseFloat(document.getElementById('rJPY').value) || 0;
  document.getElementById('jpyBadge').textContent = v.toFixed(4);
}

// ═══════════════════════════════════════
// FILTER + RENDER TABLE
// ═══════════════════════════════════════
function doFilter() {
  const brand = document.getElementById('sBrand').value.toLowerCase().trim();
  const model = document.getElementById('sModel').value.toLowerCase().trim();
  const cur   = document.getElementById('sCur').value;
  const ccB   = document.getElementById('sCC').value;
  const sort  = document.getElementById('sSort').value;

  if (!brand && !model) {
    showEmptyPrompt();
    return;
  }

  filtered = DB.filter(c => {
    if (brand && !c[1].toLowerCase().includes(brand)) return false;
    if (model && !c[2].toLowerCase().includes(model)) return false;
    if (cur && c[4] !== cur) return false;
    if (ccB && getCCBucket(c[3]) !== ccB) return false;
    return true;
  });

  if (sort === 'asc')  filtered.sort((a,b) => getFOB(a) - getFOB(b));
  if (sort === 'desc') filtered.sort((a,b) => getFOB(b) - getFOB(a));

  pg = 1;
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  document.getElementById('countBadge').textContent = filtered.length.toLocaleString() + ' vehicles';

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="no-results">No vehicles match your search.</td></tr>';
    renderPagination();
    return;
  }

  const start = (pg - 1) * PER_PAGE;
  const slice = filtered.slice(start, start + PER_PAGE);

  tbody.innerHTML = slice.map(c => {
    const fob = getFOB(c);
    const isActive = sel && sel[0] === c[0];
    return `<tr class="${isActive ? 'active-row' : ''}" onclick="clickRow(${c[0]})">
      <td style="color:var(--ink-soft);font-size:11px;width:40px">${c[0]}</td>
      <td class="td-brand">${escapeHtml(c[1])}</td>
      <td class="td-model" title="${escapeHtml(c[2])}">${escapeHtml(c[2])}</td>
      <td class="td-cc">${c[3] === 0 ? 'EV' : c[3].toLocaleString()}</td>
      <td><span class="td-cur">${c[4]}</span></td>
      <td class="td-fob">${fob.toLocaleString()}</td>
    </tr>`;
  }).join('');

  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PER_PAGE) || 1;
  document.getElementById('pgInfo').textContent = `${filtered.length.toLocaleString()} results — Page ${pg} of ${total}`;
  document.getElementById('prevBtn').disabled = pg <= 1;
  document.getElementById('nextBtn').disabled = pg >= total;

  let nums = '';
  const range = 2;
  for (let i = Math.max(1, pg - range); i <= Math.min(total, pg + range); i++) {
    nums += `<button class="pag-btn ${i===pg?'cur':''}" onclick="goPage(${i})">${i}</button>`;
  }
  document.getElementById('pgNums').innerHTML = nums;
}

function goPage(n) {
  const total = Math.ceil(filtered.length / PER_PAGE);
  pg = Math.max(1, Math.min(total, n));
  renderTable();
}

// ═══════════════════════════════════════
// SELECT & CALCULATE
// ═══════════════════════════════════════
function clickRow(bil) {
  sel = DB.find(c => c[0] === bil) || null;
  renderTable();
  if (sel) renderCalc();
}

function renderCalc() {
  if (!sel) return;

  const [bil, brand, model, cc, cur] = sel;
  const fob = getFOB(sel);
  const rate = getRate(cur);
  const duty = getDuty(cc);
  const ship = parseFloat(document.getElementById('rShip').value) || 0;

  const ovEl = document.getElementById('ovFOB');
  const ov = ovEl ? parseFloat(ovEl.value) : NaN;
  const useFOB = (!isNaN(ov) && ov > 0) ? ov : fob;

  const A = useFOB * rate;
  const B = A * 0.015;
  const C = B + ship;
  const D = A + C;
  const E = D * duty.pct;

  ['dr0','dr1','dr2','dr3','dr4'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  document.getElementById(duty.row).classList.add('active');

  const ageLabels = ['12–24 months','24–36 months','36–48 months','48–60 months','60+ months'];
  const ageIdx = parseInt(document.getElementById('sAge').value);
  const ageLbl = ageLabels[ageIdx];

  document.getElementById('calcBody').innerHTML = `
    <div class="sel-info">
      <div class="sel-brand">${escapeHtml(brand)}</div>
      <div class="sel-model">${escapeHtml(model)}</div>
      <div class="sel-tags">
        <span class="tag">${cc === 0 ? 'Electric / EV' : cc.toLocaleString() + ' cc'}</span>
        <span class="tag">${cur}</span>
        <span class="tag">${ageLbl}</span>
        <span class="tag red">${duty.lbl} duty</span>
      </div>
    </div>

    <div style="margin-bottom:12px">
      <label class="field-label">FOB from database (${cur})</label>
      <div class="fob-display">${fob.toLocaleString()} ${cur}</div>
      <label class="field-label" style="margin-top:10px">Override FOB (optional)</label>
      <input type="number" class="mono" id="ovFOB" placeholder="Leave blank to use database value"
        min="0" step="1" style="margin-top:4px"
        value="${(!isNaN(ov) && ov > 0) ? ov : ''}">
    </div>

    <div class="calc-steps">
      <div class="step">
        <div class="step-left">
          <span class="step-letter">A</span>
          <span class="step-name">FOB × Exchange Rate</span>
          <div class="step-sub">${useFOB.toLocaleString()} ${cur} × ${rate.toFixed(4)}</div>
        </div>
        <div class="step-val">${rm(A)}</div>
      </div>
      <div class="step">
        <div class="step-left">
          <span class="step-letter">B</span>
          <span class="step-name">Insurance (A × 1.5%)</span>
          <div class="step-sub">${rm(A)} × 1.5%</div>
        </div>
        <div class="step-val">${rm(B)}</div>
      </div>
      <div class="step">
        <div class="step-left">
          <span class="step-letter">C</span>
          <span class="step-name">B + Shipping</span>
          <div class="step-sub">${rm(B)} + RM ${ship.toLocaleString()}</div>
        </div>
        <div class="step-val">${rm(C)}</div>
      </div>
      <div class="step">
        <div class="step-left">
          <span class="step-letter">D</span>
          <span class="step-name">T/S Value (A + C)</span>
          <div class="step-sub">${rm(A)} + ${rm(C)}</div>
        </div>
        <div class="step-val big">${rm(D)}</div>
      </div>
      <div class="step">
        <div class="step-left">
          <span class="step-letter">E</span>
          <span class="step-name">Duty (D × ${duty.lbl})</span>
          <div class="step-sub">${rm(D)} × ${duty.lbl}</div>
        </div>
        <div class="step-val big">${rm(E)}</div>
      </div>
    </div>

    <div class="result-box">
      <div class="result-label">Estimated Import Duty</div>
      <div class="result-value">${rm(E)}</div>
      <div class="result-sub">${escapeHtml(brand)} · ${duty.lbl} · ${ageLbl}</div>
    </div>

    <div class="action-row">
      <button class="btn btn-primary" onclick="window.print()">Print / PDF</button>
      <button class="btn btn-ghost" onclick="clearSel()">Clear</button>
    </div>
  `;

  document.getElementById('ovFOB').addEventListener('input', renderCalc);
}

function clearSel() {
  sel = null;
  ['dr0','dr1','dr2','dr3','dr4'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById('calcBody').innerHTML = `
    <div class="empty">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 12l2-5h14l2 5M5 12h14v6a1 1 0 01-1 1H6a1 1 0 01-1-1v-6z"/>
        <circle cx="7.5" cy="17" r="0.5" fill="currentColor"/>
        <circle cx="16.5" cy="17" r="0.5" fill="currentColor"/>
      </svg>
      <p>Click any vehicle in the table to calculate its import duty.</p>
    </div>`;
  renderTable();
}
</script>
</body>
</html>
